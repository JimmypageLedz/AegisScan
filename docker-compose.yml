services:
  redis:
    image: redis:7
    container_name: aegisscan-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    container_name: aegisscan-api
    depends_on:
      - redis
    environment:
      DATABASE_URL: sqlite:////data/aegisscan.db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      LLM_MODE: ${LLM_MODE:-mock}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/data

  worker:
    build:
      context: ./backend
    container_name: aegisscan-worker
    depends_on:
      - redis
    environment:
      DATABASE_URL: sqlite:////data/aegisscan.db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      LLM_MODE: ${LLM_MODE:-mock}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
    command:
      [
        "python",
        "-m",
        "celery",
        "-A",
        "app.celery_app:celery_app",
        "worker",
        "--loglevel=info"
      ]
    volumes:
      - backend-data:/data

volumes:
  backend-data:
